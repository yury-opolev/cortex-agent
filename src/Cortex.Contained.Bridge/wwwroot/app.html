<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortex</title>
    <link rel="stylesheet" href="/lib/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/lib/bootstrap-icons/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/lib/highlightjs/styles/github-dark.min.css" id="hljs-theme" />
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div x-data="appShell()" class="app-shell" x-cloak>

    <!-- ═══════════════════════════════════════════════════════════
         Sidebar
         ═══════════════════════════════════════════════════════════ -->
    <aside class="sidebar" :class="sidebarCollapsed ? 'collapsed' : 'expanded'">

        <!-- Logo / brand -->
        <div class="sidebar-header">
            <span class="sidebar-item-icon"><i class="bi bi-cpu"></i></span>
            <span class="sidebar-header-label fw-semibold">Cortex</span>
        </div>

        <!-- Navigation items -->
        <div class="sidebar-items">
            <!-- Chat -->
            <a href="/chat" class="sidebar-item" :class="{ active: page === 'chat' }"
               @click.prevent="nav('/chat')" title="Chat">
                <span class="sidebar-item-icon"><i class="bi bi-chat-dots"></i></span>
                <span class="sidebar-item-label">Chat</span>
            </a>

            <!-- Admin / Tenants overview -->
            <a href="/tenants" class="sidebar-item" :class="{ active: page === 'tenants' }"
               @click.prevent="nav('/tenants')" title="Tenants">
                <span class="sidebar-item-icon"><i class="bi bi-diagram-3"></i></span>
                <span class="sidebar-item-label">Admin</span>
            </a>

            <!-- Tenant tree (expanded sidebar only) -->
            <template x-if="!sidebarCollapsed && tenants.length > 0">
                <div class="sidebar-section">
                    <div class="sidebar-section-label">TENANTS</div>

                    <template x-for="t in tenants" :key="t.tenantId">
                        <div class="sidebar-tenant">
                            <!-- Tenant name row (click to expand/collapse) -->
                            <button class="sidebar-item sidebar-tenant-toggle"
                                    :class="{ active: $store.router.tenantId === t.tenantId && page.startsWith('tenant-') }"
                                    @click="toggleTenant(t.tenantId)">
                                <span class="sidebar-item-icon">
                                    <i class="bi" :class="expandedTenants[t.tenantId] ? 'bi-chevron-down' : 'bi-chevron-right'"
                                       style="font-size:var(--text-2xs);"></i>
                                </span>
                                <span class="sidebar-item-label" x-text="t.tenantId"></span>
                            </button>

                            <!-- Sub-pages (collapsible) -->
                            <div class="sidebar-tenant-pages" x-show="expandedTenants[t.tenantId]">
                                <a :href="`/tenants/${encodeURIComponent(t.tenantId)}/settings`"
                                   class="sidebar-item sidebar-sub-item"
                                   :class="{ active: page === 'tenant-settings' && $store.router.tenantId === t.tenantId }"
                                   @click.prevent="nav(`/tenants/${encodeURIComponent(t.tenantId)}/settings`)">
                                    <span class="sidebar-item-icon"><i class="bi bi-gear"></i></span>
                                    <span class="sidebar-item-label">Settings</span>
                                </a>
                                <a :href="`/tenants/${encodeURIComponent(t.tenantId)}/history`"
                                   class="sidebar-item sidebar-sub-item"
                                   :class="{ active: page === 'tenant-history' && $store.router.tenantId === t.tenantId }"
                                   @click.prevent="nav(`/tenants/${encodeURIComponent(t.tenantId)}/history`)">
                                    <span class="sidebar-item-icon"><i class="bi bi-clock-history"></i></span>
                                    <span class="sidebar-item-label">History</span>
                                </a>
                                <a :href="`/tenants/${encodeURIComponent(t.tenantId)}/memory`"
                                   class="sidebar-item sidebar-sub-item"
                                   :class="{ active: page === 'tenant-memory' && $store.router.tenantId === t.tenantId }"
                                   @click.prevent="nav(`/tenants/${encodeURIComponent(t.tenantId)}/memory`)">
                                    <span class="sidebar-item-icon"><i class="bi bi-sd-card"></i></span>
                                    <span class="sidebar-item-label">Memory</span>
                                </a>
                            </div>
                        </div>
                    </template>

                    <!-- Global Settings (under SYSTEM heading) -->
                    <div class="sidebar-section-label" style="margin-top: 8px;">SYSTEM</div>
                    <a href="/settings" class="sidebar-item" :class="{ active: page === 'settings' }"
                       @click.prevent="nav('/settings')">
                        <span class="sidebar-item-icon"><i class="bi bi-sliders"></i></span>
                        <span class="sidebar-item-label">Global Settings</span>
                    </a>
                    <a href="/help" class="sidebar-item" :class="{ active: page === 'help' }"
                       @click.prevent="nav('/help')">
                        <span class="sidebar-item-icon"><i class="bi bi-question-circle"></i></span>
                        <span class="sidebar-item-label">Help</span>
                    </a>
                </div>
            </template>

            <!-- Global Settings + Help fallback (collapsed mode or no tenants) -->
            <template x-if="sidebarCollapsed || tenants.length === 0">
                <div>
                    <a href="/settings" class="sidebar-item" :class="{ active: page === 'settings' }"
                       @click.prevent="nav('/settings')" title="Global Settings">
                        <span class="sidebar-item-icon"><i class="bi bi-sliders"></i></span>
                        <span class="sidebar-item-label">Global Settings</span>
                    </a>
                    <a href="/help" class="sidebar-item" :class="{ active: page === 'help' }"
                       @click.prevent="nav('/help')" title="Help">
                        <span class="sidebar-item-icon"><i class="bi bi-question-circle"></i></span>
                        <span class="sidebar-item-label">Help</span>
                    </a>
                </div>
            </template>
        </div>

        <!-- Footer: theme toggle + connection status -->
        <div class="sidebar-footer">
            <button class="sidebar-item" @click="Alpine.store('theme').toggle()"
                    :title="'Theme: ' + Alpine.store('theme').label + ' (click to change)'">
                <span class="sidebar-item-icon">
                    <i class="bi" :class="Alpine.store('theme').icon"></i>
                </span>
                <span class="sidebar-item-label" x-text="Alpine.store('theme').label"></span>
            </button>
            <div class="sidebar-item connection-badge" title="Connection status">
                <span class="sidebar-item-icon">
                    <span class="presence" :class="connectionOk ? 'is-live' : 'is-off'"></span>
                </span>
                <span class="sidebar-item-label text-body-secondary" style="font-size:var(--text-xs);"
                      x-text="connectionOk ? 'Connected' : 'Disconnected'"></span>
            </div>
            <div class="sidebar-item" style="pointer-events: none;">
                <span class="sidebar-item-icon"></span>
                <span class="sidebar-item-label text-body-secondary" style="font-size:var(--text-2xs);"
                      x-text="bridgeVersion"></span>
            </div>
        </div>
    </aside>

    <!-- ═══════════════════════════════════════════════════════════
         Content Area
         ═══════════════════════════════════════════════════════════ -->
    <main class="content-area">

        <!-- Toast (shared across all pages) -->
        <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100;"
             x-data x-show="$store.toast.visible" x-transition.opacity>
            <div class="toast show align-items-center border-0"
                 :class="{
                     'text-bg-success': $store.toast.type === 'success',
                     'text-bg-danger':  $store.toast.type === 'error',
                     'text-bg-warning': $store.toast.type === 'warning',
                     'text-bg-info':    $store.toast.type === 'info',
                 }">
                <div class="d-flex">
                    <div class="toast-body" x-text="$store.toast.message"></div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                            @click="$store.toast.visible = false"></button>
                </div>
            </div>
        </div>

        <!-- ── Tenant Sub-Nav (shared across all /tenants/{id}/* pages) ── -->
        <template x-if="['tenant-settings','tenant-history','tenant-channel-history','tenant-memory'].includes($store.router.page)">
            <div x-data="tenantTabs()" class="container pt-3 pb-3" style="max-width: 860px;">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-secondary" @click="backToTenants()">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <h5 class="mb-0" x-text="tenantId"></h5>
                    <div class="ms-auto d-flex gap-1">
                        <button class="btn btn-sm"
                                :class="isActive('settings') ? 'btn-primary' : 'btn-outline-secondary'"
                                :disabled="isActive('settings')" @click="navSub('settings')">
                            <i class="bi bi-gear me-1"></i>Settings
                        </button>
                        <button class="btn btn-sm"
                                :class="isActive('history') ? 'btn-primary' : 'btn-outline-secondary'"
                                :disabled="isActive('history')" @click="navSub('history')">
                            <i class="bi bi-clock-history me-1"></i>History
                        </button>
                        <button class="btn btn-sm"
                                :class="isActive('memory') ? 'btn-primary' : 'btn-outline-secondary'"
                                :disabled="isActive('memory')" @click="navSub('memory')">
                            <i class="bi bi-sd-card me-1"></i>Memory
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <!-- ── Chat Page ──────────────────────────────────────── -->
        <template x-if="$store.router.page === 'chat'">
            <div id="chat-page" style="display: flex; flex-direction: column; height: 100%;">
                <!-- Header bar -->
                <header id="chat-header" class="chat-header">
                    <h1 class="logo">Cortex</h1>
                    <nav class="header-actions">
                        <span id="connection-status" class="conn-badge disconnected" title="Connection status">
                            <span class="presence is-off"></span>
                            <span class="status-text">Disconnected</span>
                        </span>
                    </nav>
                </header>

                <!-- Main chat area -->
                <div id="chat-area" class="chat-area">
                    <!-- Messages container -->
                    <div id="messages" class="messages chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
                        <!-- Populated by JS -->
                    </div>

                    <!-- Streaming indicator -->
                    <div id="streaming-indicator" class="streaming-indicator hidden">
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>

                    <!-- Input area -->
                    <div id="input-area" class="input-area chat-input-area">
                        <form id="chat-form" class="chat-form">
                            <textarea id="message-input" class="message-input"
                                      placeholder="Type a message..."
                                      rows="1"
                                      maxlength="100000"
                                      aria-label="Message input"></textarea>
                            <button type="submit" id="send-btn" class="btn btn-send" title="Send message" disabled>
                                <i class="bi bi-send-fill" style="font-size:var(--text-xl);"></i>
                            </button>
                            <button type="button" id="abort-btn" class="btn btn-abort hidden" title="Stop generating">
                                <i class="bi bi-stop-fill" style="font-size:var(--text-xl);"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </template>

        <!-- ── Tenants List ───────────────────────────────────── -->
        <template x-if="$store.router.page === 'tenants'">
        <div x-data="tenantsPage()" class="container py-3" style="max-width: 860px;">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h5 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>Tenants</h5>
                <button class="btn btn-sm btn-outline-success" @click="showAddModal = true">
                    <i class="bi bi-plus-lg me-1"></i>Add Tenant
                </button>
            </div>

            <!-- Loading -->
            <div x-show="loading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                Loading...
            </div>

            <!-- Tenant Cards -->
            <div x-show="!loading" class="d-flex flex-column gap-3">
                <template x-for="t in tenants" :key="t.tenantId">
                    <div>
                        <div class="card">
                            <div class="card-body">
                                <!-- Header: name + status -->
                                <div class="d-flex align-items-center justify-content-between mb-2">
                                    <div class="d-flex align-items-center gap-2">
                                        <strong x-text="t.tenantId" class="text-truncate" style="max-width: 150px;"></strong>
                                        <span x-show="t.isDefault" class="badge bg-primary">Default</span>
                                        <span class="badge" :class="statusBadge(t)" x-text="t.status"></span>
                                    </div>
                                    <div class="d-flex gap-1">
                                        <button x-show="!t.isDefault" class="btn btn-sm btn-outline-primary"
                                                @click="setDefault(t.tenantId)" title="Set as default">
                                            <i class="bi bi-star"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-secondary"
                                                @click="openTenant(t.tenantId)" title="Settings">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn btn-sm"
                                                :class="t.isDefault ? 'btn-outline-warning' : 'btn-outline-danger'"
                                                @click="confirmDelete(t)"
                                                :title="t.isDefault ? 'Clear all data' : 'Delete tenant'">
                                            <i class="bi" :class="t.isDefault ? 'bi-exclamation-triangle' : 'bi-trash'"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- Discord Status -->
                                <div class="mb-2">
                                    <small class="text-body-secondary">
                                        <i class="bi bi-discord me-1"></i>
                                        <template x-if="t.discordUsername">
                                            <span>
                                                <span class="text-success" x-text="t.discordUsername"></span>
                                                <button class="btn btn-sm btn-link text-danger p-0 ms-1"
                                                        @click="unlinkDiscord(t)" title="Unlink">
                                                    <i class="bi bi-x-circle"></i>
                                                </button>
                                            </span>
                                        </template>
                                        <template x-if="!t.discordUsername && !t.hasSetupCode">
                                            <span>
                                                Not linked
                                                <button class="btn btn-sm btn-link p-0 ms-1"
                                                        @click="generateSetupCode(t)" title="Generate pairing code">
                                                    <i class="bi bi-link-45deg"></i> Generate Code
                                                </button>
                                            </span>
                                        </template>
                                        <template x-if="!t.discordUsername && t.hasSetupCode">
                                            <span>
                                                Code: <code x-text="t._setupCode || 'CORTEX-****'" class="fs-6"></code>
                                                <button class="btn btn-sm btn-link p-0 ms-1"
                                                        @click="generateSetupCode(t)" title="Regenerate">
                                                    <i class="bi bi-arrow-clockwise"></i>
                                                </button>
                                            </span>
                                        </template>
                                    </small>
                                </div>

                                <!-- API Status -->
                                <div class="mb-2">
                                    <small class="text-body-secondary">
                                        <i class="bi bi-plug me-1"></i>
                                        API:
                                        <span x-show="t.apiEnabled" class="text-success">Enabled</span>
                                        <span x-show="!t.apiEnabled" class="text-body-secondary">Disabled</span>
                                    </small>
                                </div>

                                <!-- Meta -->
                                <div class="text-body-secondary" style="font-size:var(--text-xs);">
                                    <span x-show="t.port">Port: <span x-text="t.port"></span></span>
                                    <span x-show="t.messageCount > 0" class="ms-2">
                                        <span x-text="t.messageCount"></span> msgs
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Add Tenant Modal -->
            <div x-show.important="showAddModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Add Tenant</h5>
                            <button type="button" class="btn-close" @click="showAddModal = false"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Tenant ID</label>
                                <input type="text" class="form-control" x-model="form.tenantId"
                                       placeholder="e.g. alice" @keydown.enter="addTenant()">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Port</label>
                                <input type="number" class="form-control" x-model.number="form.port">
                            </div>
                            <div class="form-check mb-2">
                                <input type="checkbox" class="form-check-input" id="add-enabled" x-model="form.enabled">
                                <label class="form-check-label" for="add-enabled">Enabled</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="add-api" x-model="form.apiEnabled">
                                <label class="form-check-label" for="add-api">API channel enabled</label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" @click="showAddModal = false">Cancel</button>
                            <button class="btn btn-primary" @click="addTenant()"
                                    :disabled="!form.tenantId.trim()">Create</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Delete Confirmation Modal -->
            <div x-show.important="showDeleteModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
                <div class="modal-dialog modal-sm">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" x-text="deleteTarget?.isDefault ? 'Clear Data' : 'Delete Tenant'"></h5>
                            <button type="button" class="btn-close" @click="showDeleteModal = false"></button>
                        </div>
                        <div class="modal-body">
                            <p x-show="deleteTarget?.isDefault">Clear all messages and memories for the default tenant?</p>
                            <p x-show="!deleteTarget?.isDefault">Delete tenant <strong x-text="deleteTarget?.tenantId"></strong> and all its data?</p>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" @click="showDeleteModal = false">Cancel</button>
                            <button class="btn" :class="deleteTarget?.isDefault ? 'btn-warning' : 'btn-danger'"
                                    @click="doDelete()"
                                    x-text="deleteTarget?.isDefault ? 'Clear Data' : 'Delete'"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>

        <!-- ── Tenant Settings ────────────────────────────────── -->
        <template x-if="$store.router.page === 'tenant-settings'">
        <div x-data="tenantSettingsPage()" class="container pb-3" style="max-width: 860px;">
            <!-- Sub-nav is rendered above by the shared tenantTabs() block. -->

            <div x-show="loading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm"></div> Loading...
            </div>

            <div x-show="!loading && tenant" class="row g-3">
                <!-- General Settings -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-gear me-2"></i>General</div>
                        <div class="card-body">
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="enabled-toggle"
                                       x-model="enabled" @change="save()">
                                <label class="form-check-label" for="enabled-toggle">Enabled</label>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <label class="form-label mb-0 text-body-secondary" for="voice-gender">Voice Gender</label>
                                <select class="form-select form-select-sm" id="voice-gender" style="width: 120px;"
                                        x-model="voiceGender" @change="save()">
                                    <option value="female">Female</option>
                                    <option value="male">Male</option>
                                </select>
                                <small class="text-body-secondary">Auto-detected from personality, or set manually.</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Discord Pairing Card -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-discord me-2"></i>Discord</div>
                        <div class="card-body">
                            <!-- Linked -->
                            <template x-if="tenant?.discordUsername">
                                <div>
                                    <div class="d-flex align-items-center gap-2 mb-2">
                                        <span class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Linked</span>
                                        <strong x-text="tenant.discordUsername"></strong>
                                        <small class="text-body-secondary" x-text="'ID: ' + tenant.discordUserId"></small>
                                    </div>
                                    <button class="btn btn-sm btn-outline-danger" @click="unlinkDiscord()">
                                        <i class="bi bi-x-circle me-1"></i>Unlink
                                    </button>
                                </div>
                            </template>

                            <!-- Not linked -->
                            <template x-if="!tenant?.discordUsername">
                                <div>
                                    <p class="text-body-secondary mb-2">No Discord user linked to this tenant.</p>

                                    <!-- Setup code active -->
                                    <template x-if="setupCode">
                                        <div class="d-flex align-items-center gap-2">
                                            <code class="fs-5 px-2 py-1 bg-body-secondary rounded" x-text="setupCode"></code>
                                            <button class="btn btn-sm btn-outline-secondary" @click="copyCode()" title="Copy">
                                                <i class="bi bi-clipboard"></i>
                                            </button>
                                            <small class="text-body-secondary" x-text="'Expires in ' + codeCountdown"></small>
                                            <button class="btn btn-sm btn-outline-danger" @click="revokeCode()">Revoke</button>
                                        </div>
                                    </template>

                                    <!-- No code yet -->
                                    <template x-if="!setupCode">
                                        <div>
                                            <button class="btn btn-sm btn-outline-primary" @click="generateCode()">
                                                <i class="bi bi-link-45deg me-1"></i>Generate Setup Code
                                            </button>
                                            <div class="mt-2">
                                                <small class="text-body-secondary">
                                                    Generate a code, then send the instructions to the user.
                                                </small>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Setup instructions (shown after code is generated) -->
                                    <template x-if="setupCode">
                                        <div class="mt-3">
                                            <label class="form-label fw-semibold">
                                                <i class="bi bi-send me-1"></i>Send these instructions to the user:
                                            </label>
                                            <pre class="bg-body-secondary rounded p-3 mb-2" style="white-space: pre-wrap; font-size:var(--text-sm);"
                                                 x-text="setupInstructions"></pre>
                                            <button class="btn btn-sm btn-outline-secondary" @click="copyInstructions()">
                                                <i class="bi bi-clipboard me-1"></i>Copy Instructions
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Voice Channel Card (only visible when Discord user is linked) -->
                <template x-if="tenant?.discordUserId">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-mic me-2"></i>Discord Voice Channel</div>
                        <div class="card-body">
                            <!-- Step 1: Invite bot (shown when guild ID not yet set) -->
                            <template x-if="!discordGuildId">
                                <div class="mb-3 p-3 rounded" style="background: var(--bg-tertiary, rgba(255,255,255,0.03));">
                                    <p class="small fw-semibold mb-2"><i class="bi bi-1-circle me-1"></i>Invite bot to server</p>
                                    <p class="small text-body-secondary mb-2" x-show="botApplicationId">
                                        <a :href="'https://discord.com/oauth2/authorize?client_id=' + botApplicationId + '&scope=bot&permissions=36703232'"
                                           target="_blank" class="link-primary"><i class="bi bi-box-arrow-up-right me-1"></i>Add bot to Discord server</a>
                                        — grants voice + text permissions. If the bot is already in the server, skip this step.
                                    </p>
                                    <p class="small text-body-secondary mb-0" x-show="!botApplicationId">
                                        Invite the bot to your Discord server with voice + text permissions.
                                    </p>
                                </div>
                            </template>

                            <!-- Step 2: Enter IDs -->
                            <div class="mb-3 p-3 rounded" x-show="!discordGuildId || !discordVoiceChannelId"
                                 style="background: var(--bg-tertiary, rgba(255,255,255,0.03));">
                                <p class="small fw-semibold mb-2">
                                    <i class="bi bi-2-circle me-1" x-show="!discordGuildId"></i>
                                    <i class="bi bi-1-circle me-1" x-show="discordGuildId && !discordVoiceChannelId"></i>
                                    Copy IDs from Discord
                                </p>
                                <p class="small text-body-secondary mb-0">
                                    Open the voice channel in Discord — the URL contains both IDs:<br>
                                    <code class="small">discord.com/channels/<strong>GUILD_ID</strong>/<strong>CHANNEL_ID</strong></code>
                                </p>
                            </div>

                            <div class="mb-2">

                                <input type="text" class="form-control form-control-sm font-monospace"
                                       x-model="discordGuildId"
                                       placeholder="First number in discord.com/channels/GUILD/CHANNEL">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Voice Channel ID</label>
                                <input type="text" class="form-control form-control-sm font-monospace"
                                       x-model="discordVoiceChannelId"
                                       placeholder="Second number in discord.com/channels/GUILD/CHANNEL">

                            <div x-show="discordGuildId && discordVoiceChannelId" x-transition>
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">Voice Greeting</label>

                                           placeholder="Spoken when bot joins voice channel (blank = disabled)">

                            </div>

                            <button class="btn btn-sm btn-primary" @click="saveVoiceConfig()" :disabled="savingVoice">
                                <i class="bi bi-check-lg me-1"></i>Save Voice Settings
                            </button>

                            <!-- Status messages -->
                            <template x-if="discordGuildId && discordVoiceChannelId">
                                <div class="mt-2">
                                    <small class="text-success"><i class="bi bi-check-circle me-1"></i>Configured — join the voice channel in Discord and the bot will auto-connect.</small>
                                </div>
                            </template>
                            <template x-if="!discordGuildId || !discordVoiceChannelId">
                                <div class="mt-2">
                                    <small class="text-body-secondary">Requires STT and TTS engines to be running.</small>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
                </template>

                <!-- API Channel Card -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-plug me-2"></i>API Channel</div>
                        <div class="card-body">
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" id="api-toggle"
                                       x-model="apiEnabled" @change="save()">
                                <label class="form-check-label" for="api-toggle">Enable API channel</label>
                            </div>

                            <div x-show="apiEnabled">
                                <template x-if="apiKey">
                                    <div>
                                        <div class="input-group input-group-sm mb-2">
                                            <input :type="apiKeyRevealed ? 'text' : 'password'" class="form-control font-monospace"
                                                   :value="apiKey" readonly>
                                            <button class="btn btn-outline-secondary" @click="apiKeyRevealed = !apiKeyRevealed">
                                                <i class="bi" :class="apiKeyRevealed ? 'bi-eye-slash' : 'bi-eye'"></i>
                                            </button>
                                            <button class="btn btn-outline-secondary" @click="copyApiKey()" title="Copy">
                                                <i class="bi bi-clipboard"></i>
                                            </button>
                                        </div>
                                        <button class="btn btn-sm btn-outline-danger" @click="revokeApiKey()">
                                            <i class="bi bi-x-circle me-1"></i>Revoke Key
                                        </button>
                                    </div>
                                </template>
                                <template x-if="!apiKey">
                                    <button class="btn btn-sm btn-outline-primary" @click="generateApiKey()">
                                        <i class="bi bi-key me-1"></i>Generate API Key
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Personality Card -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-person-badge me-2"></i>Personality</div>
                        <div class="card-body">
                            <p class="text-secondary small mb-2">
                                Define how the agent behaves, its name, tone, and instructions. Changes take effect on the next message.
                            </p>
                            <textarea class="form-control font-monospace mb-2" rows="5" x-model="persona"
                                      placeholder="You are a helpful personal AI assistant. Be concise and direct."
                                      :disabled="personalityLoading"></textarea>
                            <div class="text-secondary small mb-2">The agent can also modify its own personality when asked by the user.</div>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-primary" @click="savePersonality()" :disabled="savingPersonality">
                                    <i class="bi bi-check-lg me-1"></i>Save Personality
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" @click="resetPersonality()" :disabled="savingPersonality">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i>Reset to Default
                                </button>
                                <span class="text-secondary small" x-text="personalityStatus"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Self-Notes Card -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-journal-text me-2"></i>Self-Notes</div>
                        <div class="card-body">
                            <p class="text-secondary small mb-2">
                                Operating principles that govern how the agent works. Should be stable and rarely changed.
                                User preferences and specific procedures belong in memory or skills, not here.
                            </p>
                            <textarea class="form-control font-monospace mb-2" rows="8" x-model="selfNotes"
                                      placeholder="No self-notes yet."
                                      :disabled="selfNotesLoading"></textarea>
                            <div class="d-flex align-items-center gap-2">
                                <button class="btn btn-sm btn-primary" @click="saveSelfNotes()" :disabled="savingSelfNotes">
                                    <i class="bi bi-check-lg me-1"></i>Save Self-Notes
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" @click="resetSelfNotes()" :disabled="savingSelfNotes">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i>Reset to Default
                                </button>
                                <span class="text-secondary small" x-text="selfNotesStatus"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Voice Identification Card -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-mic-fill me-2"></i>Voice identification</div>
                        <div class="card-body">
                            <p class="text-secondary small mb-2">
                                When enabled, the agent only acts on voice utterances that match the enrolled owner's voiceprint.
                                Setup happens in voice (the agent offers it after a few utterances); admin actions here.
                            </p>

                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" role="switch" id="voiceIdFeatureEnabled"
                                       x-model="voiceIdFeatureEnabled" @change="saveVoiceIdFeatureFlag()"
                                       :disabled="voiceIdLoading || savingVoiceId">
                                <label class="form-check-label" for="voiceIdFeatureEnabled">
                                    Feature enabled
                                </label>
                            </div>

                            <dl class="row mb-3 small">
                                <dt class="col-sm-3 text-secondary">Status</dt>
                                <dd class="col-sm-9"><code x-text="voiceIdState"></code></dd>

                                <dt class="col-sm-3 text-secondary">Embedding dim</dt>
                                <dd class="col-sm-9" x-text="voiceIdEmbeddingDim || '—'"></dd>

                                <dt class="col-sm-3 text-secondary">Model</dt>
                                <dd class="col-sm-9" x-text="voiceIdModelId || '—'"></dd>
                            </dl>

                            <div class="d-flex align-items-center gap-2 mb-3">
                                <button class="btn btn-sm btn-primary" @click="startVoiceIdEnrollment()"
                                        x-show="voiceIdCanStartEnrollment"
                                        :disabled="voiceIdLoading || savingVoiceId">
                                    <i class="bi bi-mic me-1"></i>Start enrollment
                                </button>
                                <button class="btn btn-sm btn-outline-danger" @click="resetVoiceIdEnrollment()"
                                        :disabled="voiceIdLoading || savingVoiceId">
                                    <i class="bi bi-trash me-1"></i>Forget voiceprint
                                </button>
                                <button class="btn btn-sm btn-link" @click="voiceIdShowAdvanced = !voiceIdShowAdvanced">
                                    <span x-show="!voiceIdShowAdvanced">Show advanced</span>
                                    <span x-show="voiceIdShowAdvanced">Hide advanced</span>
                                </button>
                                <span class="text-secondary small" x-text="voiceIdStatus"></span>
                            </div>

                            <div x-show="voiceIdShowAdvanced" class="mt-2">
                                <label class="form-label small text-secondary">
                                    Cosine threshold override (0&ndash;1, blank for default 0.55)
                                </label>
                                <div class="d-flex gap-2">
                                    <input type="text" class="form-control form-control-sm"
                                           style="max-width: 8em"
                                           x-model="voiceIdThresholdOverrideInput"
                                           placeholder="0.55"
                                           :disabled="savingVoiceId">
                                    <button class="btn btn-sm btn-outline-secondary" @click="saveVoiceIdThreshold()"
                                            :disabled="savingVoiceId">
                                        Set
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        </template>

        <!-- ── Tenant History (channel overview) ──────────────── -->
        <template x-if="$store.router.page === 'tenant-history'">
        <div x-data="tenantHistoryPage()" class="container pb-3" style="max-width: 860px;">
            <!-- Sub-nav is rendered above by the shared tenantTabs() block. -->

            <div class="d-flex justify-content-between mb-3">
                <small class="text-body-secondary align-self-center" x-text="channels.length + ' channels'"></small>
                <button class="btn btn-sm btn-outline-danger" @click="openClearModal()">
                    <i class="bi bi-trash me-1"></i>Clear all history
                </button>
            </div>

            <div x-show="loading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm"></div> Loading...
            </div>

            <!-- Empty state -->
            <div x-show="!loading && channels.length === 0" class="text-body-secondary text-center py-5">
                No message history yet.
            </div>

            <!-- Channel cards -->
            <div x-show="!loading && channels.length > 0" class="row g-3">
                <template x-for="ch in channels" :key="ch.id">
                    <div class="col-12 col-md-6">
                        <button type="button"
                                class="card w-100 h-100 text-start border"
                                style="border-radius: var(--radius); cursor: pointer;"
                                @click="openChannel(ch)">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-1">
                                    <strong x-text="prettyName(ch.id)"></strong>
                                    <span class="badge bg-secondary" x-text="ch.messageCount + ' msgs'"></span>
                                </div>
                                <div class="small text-body-secondary" x-text="ch.id"></div>
                                <div class="small text-body-secondary mt-2">
                                    <i class="bi bi-clock-history me-1"></i>
                                    <span x-text="relativeTime(ch.lastActivity)"></span>
                                </div>
                            </div>
                        </button>
                    </div>
                </template>
            </div>

            <!-- Clear All History Modal -->
            <div x-show.important="showClearModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Clear all history</h5>
                            <button type="button" class="btn-close" @click="showClearModal = false"></button>
                        </div>
                        <div class="modal-body">
                            <p>Delete all messages older than:</p>
                            <input type="datetime-local" class="form-control" x-model="clearOlderThan">
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-outline-secondary btn-sm" @click="showClearModal = false">Cancel</button>
                            <button class="btn btn-outline-danger btn-sm" @click="confirmClear()" :disabled="clearing">
                                <span x-show="!clearing">Delete</span>
                                <span x-show="clearing"><span class="spinner-border spinner-border-sm"></span> Deleting...</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>

        <!-- ── Tenant Channel History (drill-in) ──────────────── -->
        <template x-if="$store.router.page === 'tenant-channel-history'">
        <div x-data="tenantChannelHistoryPage()" class="container pb-3" style="max-width: 860px;">
            <!-- Sub-nav is rendered above by the shared tenantTabs() block. -->

            <!-- Channel breadcrumb + clear button -->
            <div class="d-flex align-items-center gap-2 mb-2">
                <button class="btn btn-sm btn-outline-secondary" @click="backToOverview()" title="Back to channels">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <nav aria-label="breadcrumb" class="flex-grow-1">
                    <ol class="breadcrumb mb-0 small">
                        <li class="breadcrumb-item">
                            <a href="#" @click.prevent="backToOverview()">History</a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page" x-text="prettyChannel"></li>
                    </ol>
                </nav>
                <button class="btn btn-sm btn-outline-danger" @click="openClearModal()">
                    <i class="bi bi-trash me-1"></i>Clear this channel's history
                </button>
            </div>

            <div x-show="loading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm"></div> Loading...
            </div>

            <!-- Messages (direct view; a channel == a conversation) -->
            <div x-show="!loading">
                <div x-show="messages.length === 0" class="text-body-secondary text-center py-3">
                    No messages in this channel yet.
                </div>
                <div x-show="messages.length > 0" class="mb-2">
                    <small class="text-body-secondary" x-text="totalMessages + ' messages'"></small>
                </div>
                <div class="d-flex flex-column gap-2">
                    <template x-for="msg in messages" :key="msg.messageId">
                        <div class="d-flex gap-2" :class="{ 'opacity-50': isSystemMessage(msg), 'opacity-75': isProactiveMessage(msg) }">
                            <span class="badge rounded-pill align-self-start mt-1" :class="roleBadge(msg.role)">
                                <i class="bi" :class="roleIcon(msg.role)"></i>
                            </span>
                            <div class="flex-grow-1">
                                <div class="small"
                                     :class="isSystemMessage(msg) ? 'fst-italic text-warning' : isProactiveMessage(msg) ? 'fst-italic' : ''"
                                     x-text="msg.content" style="white-space: pre-wrap;"></div>
                                <small class="text-body-secondary" x-text="formatTime(msg.timestamp)"></small>
                                <template x-if="messageBadge(msg)">
                                    <span class="badge ms-1" :class="messageBadge(msg)?.cls" x-text="messageBadge(msg)?.text"></span>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
                <div x-show="totalMessages > msgLimit" class="d-flex justify-content-between mt-2">
                    <button class="btn btn-sm btn-outline-secondary" :disabled="!hasPrevMessages" @click="prevMessages()">
                        <i class="bi bi-arrow-left"></i> Newer
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" :disabled="!hasMoreMessages" @click="nextMessages()">
                        Older <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- Clear this channel modal -->
            <div x-show.important="showClearModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Clear channel history</h5>
                            <button type="button" class="btn-close" @click="showClearModal = false"></button>
                        </div>
                        <div class="modal-body">
                            <p>
                                This clears messages for
                                <strong x-text="prettyChannel"></strong>
                                only.
                            </p>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" id="clear-scope-older"
                                       value="older" x-model="clearScope">
                                <label class="form-check-label" for="clear-scope-older">
                                    Delete messages older than:
                                </label>
                            </div>
                            <input type="datetime-local" class="form-control mb-2"
                                   x-model="clearOlderThan" :disabled="clearScope !== 'older'">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="clear-scope-all"
                                       value="all" x-model="clearScope">
                                <label class="form-check-label" for="clear-scope-all">
                                    All messages in this channel
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-outline-secondary btn-sm" @click="showClearModal = false">Cancel</button>
                            <button class="btn btn-outline-danger btn-sm" @click="confirmClear()" :disabled="clearing">
                                <span x-show="!clearing">Delete</span>
                                <span x-show="clearing"><span class="spinner-border spinner-border-sm"></span> Deleting...</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>

        <!-- ── Tenant Memory ──────────────────────────────────── -->
        <template x-if="$store.router.page === 'tenant-memory'">
        <div x-data="tenantMemoryPage()" class="container pb-3" style="max-width: 860px;">
            <!-- Sub-nav is rendered above by the shared tenantTabs() block. -->

            <div class="d-flex justify-content-between mb-3">
                <small class="text-body-secondary align-self-center" x-text="totalCount + ' memories'"></small>
                <button class="btn btn-sm btn-outline-success" @click="openAdd()">
                    <i class="bi bi-plus-lg me-1"></i>Add Memory
                </button>
            </div>

            <div x-show="loading" class="text-center py-4">
                <div class="spinner-border spinner-border-sm"></div> Loading...
            </div>

            <!-- Memory List -->
            <div x-show="!loading" class="d-flex flex-column gap-2">
                <template x-for="m in memories" :key="m.memoryId">
                    <div class="card">
                        <div class="card-body py-2 px-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="flex-grow-1">
                                    <div x-show="m.title" class="fw-semibold mb-1" x-text="m.title"></div>
                                    <div style="white-space: pre-wrap; font-size:var(--text-base);" x-text="m.content"></div>
                                </div>
                                <div class="d-flex gap-1 ms-2 flex-shrink-0">
                                    <button class="btn btn-sm btn-outline-secondary" @click="openEdit(m)" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" @click="confirmDelete(m)" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mt-1 d-flex flex-wrap align-items-center gap-1">
                                <template x-for="tag in (m.tags || [])" :key="tag">
                                    <span class="badge bg-secondary" x-text="tag"></span>
                                </template>
                                <small class="text-body-secondary" x-text="formatDateTime(m.createdAt)"></small>
                                <template x-if="wasUpdated(m)">
                                    <small class="text-body-secondary fst-italic"
                                           x-text="'(updated ' + formatDateTime(m.updatedAt) + ')'"></small>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="memories.length === 0 && !loading" class="text-body-secondary text-center py-3">
                    No memories yet.
                </div>
            </div>

            <!-- Pagination -->
            <div x-show="totalCount > limit" class="d-flex justify-content-between mt-2">
                <button class="btn btn-sm btn-outline-secondary" :disabled="!hasPrev" @click="prev()">
                    <i class="bi bi-arrow-left"></i> Previous
                </button>
                <button class="btn btn-sm btn-outline-secondary" :disabled="!hasMore" @click="next()">
                    Next <i class="bi bi-arrow-right"></i>
                </button>
            </div>

            <!-- Add/Edit Modal -->
            <div x-show.important="showModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" x-text="editing ? 'Edit Memory' : 'Add Memory'"></h5>
                            <button type="button" class="btn-close" @click="showModal = false"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Title (optional)</label>
                                <input type="text" class="form-control" x-model="form.title" placeholder="Brief summary...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Content</label>
                                <textarea class="form-control" rows="4" x-model="form.content"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tags (comma-separated)</label>
                                <input type="text" class="form-control" x-model="form.tags" placeholder="tag1, tag2">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" @click="showModal = false">Cancel</button>
                            <button class="btn btn-primary" @click="saveMemory()" :disabled="!form.content.trim()">Save</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Delete Confirmation -->
            <div x-show.important="showDeleteModal" class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
                <div class="modal-dialog modal-sm">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Delete Memory</h5>
                            <button type="button" class="btn-close" @click="showDeleteModal = false"></button>
                        </div>
                        <div class="modal-body">Delete this memory permanently?</div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" @click="showDeleteModal = false">Cancel</button>
                            <button class="btn btn-danger" @click="doDelete()">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>

        <!-- ── Global Settings ────────────────────────────────── -->
        <template x-if="$store.router.page === 'settings'">
        <div x-data="globalSettingsPage()" class="container py-3" style="max-width: 760px;">

                        <button class="nav-link" :class="activeTab === 'general' ? 'active' : ''"
                                @click="activeTab = 'general'" type="button">General</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="activeTab === 'channels' ? 'active' : ''"
                                @click="activeTab = 'channels'" type="button">Channels</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="activeTab === 'speech' ? 'active' : ''"
                                @click="activeTab = 'speech'" type="button">Speech</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="activeTab === 'memory' ? 'active' : ''"
                                @click="activeTab = 'memory'" type="button">Memory</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="activeTab === 'coding' ? 'active' : ''"

                </ul>

                <div x-show="activeTab === 'general'">
