<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eval LLM Setup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
    <div class="container py-4" style="max-width: 600px;">

        <h3><i class="bi bi-cpu"></i> Eval LLM Setup</h3>
        <p class="text-muted">Configure the LLM provider for evals (AI judge + user simulation).<br/>
        These credentials are separate from production tenant credentials.</p>
        <hr />

        <!-- Status -->
        <div id="status" class="alert alert-secondary" style="display: none;"></div>

        <!-- Form -->
        <div class="mb-3">
            <label class="form-label">Provider Name</label>
            <input type="text" class="form-control" id="providerName" placeholder="e.g. anthropic, openai" />
        </div>

        <div class="mb-3">
            <label class="form-label">API Type</label>
            <select class="form-select" id="api">
                <option value="anthropic-messages">Anthropic Messages</option>
                <option value="openai-completions">OpenAI Completions</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Base URL <span class="text-muted">(optional)</span></label>
            <input type="text" class="form-control" id="baseUrl" placeholder="Leave empty for default" />
            <div class="form-text">Override the API endpoint. Empty = provider default.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Model</label>
            <input type="text" class="form-control" id="model" placeholder="e.g. claude-sonnet-4-20250514, gpt-4.1-nano" />
        </div>

        <div class="mb-3">
            <label class="form-label">API Key</label>
            <input type="password" class="form-control" id="apiKey" placeholder="sk-..." />
            <div class="form-text">Encrypted via DPAPI and stored separately from production credentials.</div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" id="btn-save">
                <i class="bi bi-floppy"></i> Save
            </button>
            <button class="btn btn-outline-secondary" id="btn-test">
                <i class="bi bi-lightning"></i> Test Connection
            </button>
        </div>

        <!-- Test result -->
        <div id="test-result" class="mt-3" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const $ = sel => document.querySelector(sel);

        async function loadConfig() {
            try {
                const resp = await fetch("/api/eval/provider");
                if (!resp.ok) return;
                const data = await resp.json();

                if (data.isConfigured) {
                    $("#providerName").value = data.providerName || "";
                    $("#api").value = data.api || "openai-completions";
                    $("#baseUrl").value = data.baseUrl || "";
                    $("#model").value = data.model || "";

                    const statusEl = $("#status");
                    statusEl.style.display = "";
                    statusEl.className = `alert alert-${data.hasApiKey ? "success" : "warning"}`;
                    statusEl.innerHTML = data.hasApiKey
                        ? '<i class="bi bi-check-circle"></i> Eval provider configured. API key is stored.'
                        : '<i class="bi bi-exclamation-triangle"></i> Config exists but no API key found.';
                }
            } catch { /* first run, no config */ }
        }

        async function save() {
            const body = {
                providerName: $("#providerName").value.trim(),
                api: $("#api").value,
                baseUrl: $("#baseUrl").value.trim() || null,
                model: $("#model").value.trim(),
                apiKey: $("#apiKey").value.trim() || null,
            };

            if (!body.providerName) { alert("Provider name is required"); return; }

            try {
                const resp = await fetch("/api/eval/provider", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    alert("Save failed: " + (err.error || resp.status));
                    return;
                }

                $("#apiKey").value = "";
                await loadConfig();
            } catch (err) {
                alert("Save failed: " + err.message);
            }
        }

        async function testConnection() {
            const resultEl = $("#test-result");
            resultEl.style.display = "";
            resultEl.className = "mt-3 alert alert-secondary";
            resultEl.textContent = "Testing...";

            try {
                const resp = await fetch("/api/eval/provider/test");
                const data = await resp.json();

                if (data.success) {
                    resultEl.className = "mt-3 alert alert-success";
                    resultEl.innerHTML = `<i class="bi bi-check-circle"></i> Connection successful! Model: ${data.model}`;
                } else {
                    resultEl.className = "mt-3 alert alert-danger";
                    resultEl.innerHTML = `<i class="bi bi-x-circle"></i> Failed: ${data.error}`;
                }
            } catch (err) {
                resultEl.className = "mt-3 alert alert-danger";
                resultEl.textContent = "Test failed: " + err.message;
            }
        }

        $("#btn-save").addEventListener("click", save);
        $("#btn-test").addEventListener("click", testConnection);
        loadConfig();
    </script>
</body>
</html>
